services:
  - type: web
    name: quemahtech-ems
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && node build.js
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: firebase-service-account.json
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
